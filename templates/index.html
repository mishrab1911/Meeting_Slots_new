<!DOCTYPE html>
<html>
<head>
    <title>MPDV & M3 Meeting Schedule</title>

    <style>
        body { font-family: Arial; background: #f4f6f9; margin: 20px; }
        h2 { text-align: center; color: #2c3e50; }

        table {
            border-collapse: collapse;
            width: 100%;
            background: white;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        .mpdv-header { background: #607d8b; color: white; }
        .m3-header { background: #4caf50; color: white; }

        .date-col { background: #eeeeee; }
        .day-col { background: #f5f5f5; }

        .mpdv { background-color: #dfe6e9; }
        .m3 { background-color: #d0f0c0; }

        input {
            width: 90%;
            border: none;
            text-align: center;
        }
        .mpdv input,   
        .m3 input {
            height: 38px;
            padding: 10px;
            font-size: 18px;
        }        
        .mpdv textarea,
        .m3 textarea {
            width: 100%;
            height: 50px;       /* ✅ more height */
            resize: vertical;   /* ✅ allow manual resize */
            padding: 8px;
            font-size: 16px;
            box-sizing: border-box;

            white-space: normal;        /* ✅ wrap text */
            word-wrap: break-word;      /* ✅ break long emails */
        }

        
        input[type="date"] {
            width: 400px;      /* ✅ increase width */
            height: 35px;      /* ✅ increase height */
            padding: 5px;
            font-size: 22px;
        }

        .date-col input {
            width: 100%;      /* ✅ fill full width */
            height: 35px;     /* ✅ increase height */
            box-sizing: border-box;  /* ✅ prevents overflow */
        }

        input[type="time"] {
            width: 80px;      /* ✅ increase width */
            height: 25px;      /* ✅ increase height */
            padding: 1px;
            font-size: 18px;
        }
        
        input[type="time"] {
            width: 100%;
        }

        td {
            padding: 5px;
        }




        button {
            background: #2c3e50;
            color: white;
            padding: 15px 10px;
            font-size: 20px; 
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>MPDV & M3 Meeting Schedule</h2>

<!-- ✅ ADD NEW DATE -->
<form method="POST" action="/add">
    <input type="date" name="date" required>
    <button type="submit">Add Date</button>
</form>

<br>

<table>

<tr>
    <th rowspan="2">Date</th>
    <th rowspan="2">Day</th>

    <th colspan="3" class="mpdv-header">MPDV Tech Team</th>
    <th colspan="3" class="m3-header">M3 Tech Team</th>

    <th rowspan="2">Action</th>
</tr>

<tr>
    <th class="mpdv-header">Name</th>
    <th class="mpdv-header">From</th>
    <th class="mpdv-header">To</th>

    <th class="m3-header">Name</th>
    <th class="m3-header">From</th>
    <th class="m3-header">To</th>
</tr>

{% for row in data %}
<tr>

<form method="POST" action="/update">

    <!-- Date -->
    <td class="date-col">
        <input type="date"
               name="date"
               value="{{ row[1] }}"
               onchange="updateDay(this, 'day{{ row[0] }}')">
    </td>

    <!-- Day -->
    <td id="day{{ row[0] }}" class="day-col">
        {{ row[8] }}
    </td>

    <!-- MPDV -->
    <td class="mpdv">
        
        <textarea name="mpdv_name">{{ row[2] or '' }}</textarea>
    </td>

    <td class="mpdv">
        <input type="time" name="mpdv_start_time" value="{{ row[3] or '' }}">
    </td>

    <td class="mpdv">
        <input type="time" name="mpdv_end_time" value="{{ row[4] or '' }}">
    </td>

    <!-- M3 -->
    <td class="m3">
        <textarea name="m3_name">{{ row[5] or '' }}</textarea>
    </td>

    <td class="m3">
        <input type="time" name="m3_start_time" value="{{ row[6] or '' }}">
    </td>

    <td class="m3">
        <input type="time" name="m3_end_time" value="{{ row[7] or '' }}">
    </td>

    <!-- Hidden ID -->
    <input type="hidden" name="id" value="{{ row[0] }}">

    <!-- Save -->
    <td>
        <button type="submit">Save</button>
    </td>

</form>

</tr>
{% endfor %}

</table>

<script>
function updateDay(input, dayId) {
    if (!input.value) return;

    const date = new Date(input.value);
    const day = date.toLocaleDateString('en-US', { weekday: 'short' });

    document.getElementById(dayId).innerText = day;
}
</script>

</body>
</html>
